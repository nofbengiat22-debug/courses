<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --accent: #7b5ea7;
      --accent2: #e85d75;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --bar-h: 52px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* top bar */
    header {
      height: var(--bar-h);
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      position: relative;
    }

    .dots { display: flex; gap: 6px; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .dot:nth-child(1) { background: #e85d75; }
    .dot:nth-child(2) { background: #f4c842; }
    .dot:nth-child(3) { background: #4ecf7c; }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--text);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .title span { color: var(--accent); }

    .badge {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: rgba(123,94,167,0.12);
      border: 1px solid rgba(123,94,167,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    /* iframe wrapper */
    .frame-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 10px;
      background:
        radial-gradient(ellipse 60% 60% at 20% 80%, rgba(232,93,117,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(123,94,167,0.1) 0%, transparent 70%),
        var(--bg);
    }

    .frame-border {
      width: 100%;
      height: 100%;
      max-width: 100%;
      border-radius: 10px;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 40px rgba(123,94,167,0.25), 0 20px 60px rgba(0,0,0,0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 9px;
      background: #fff;
      display: block;
    }

    /* bottom bar */
    footer {
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { color: var(--accent2); }
  </style>
</head>
<body>

  <header>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="title">COURSE <span>//</span> VIEWER</div>
    <div class="badge">00.html</div>
  </header>

  <div class="frame-wrap">
    <div class="frame-border" style="height:90%;">
      <iframe
        src="https://nofbengiat22-debug.github.io/courses/00.html"
        title="Course Content"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <footer>
    <span>SOURCE →</span>
    <a href="https://nofbengiat22-debug.github.io/courses/00.html" target="_blank">
      nofbengiat22-debug.github.io/courses/00.html
    </a>
  </footer>

</body>
</html>
